<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Browser window outline -->
	<rect x="8" y="20" width="112" height="92" rx="8" stroke="currentColor" stroke-width="5"/>
	<!-- Top bar -->
	<line x1="8" y1="40" x2="120" y2="40" stroke="currentColor" stroke-width="5"/>
	<!-- Traffic dots -->
	<circle cx="22" cy="30" r="3" fill="currentColor"/>
	<circle cx="34" cy="30" r="3" fill="currentColor"/>
	<circle cx="46" cy="30" r="3" fill="currentColor"/>
	<!-- Chain link motif inside the window -->
	<g stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none">
		<path d="M44 70 a12 12 0 0 1 12-12 h6"/>
		<path d="M62 58 h6 a12 12 0 0 1 12 12 v6 a12 12 0 0 1-12 12 h-6"/>
		<path d="M66 88 h-6 a12 12 0 0 1-12-12 v-6"/>
	</g>
	<style>svg{color:#000}@media(prefers-color-scheme:dark){svg{color:#fff}}</style>
</svg>
