name: Publish Package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Produce a tarball and skip the actual publish (for pre-release inspection)"
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # npm >= 11.5.1 is required for OIDC trusted publishing; bun publish
      # does not support it (oven-sh/bun#22423), so the publish step uses npm.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG=$(node -p "require('./package.json').version")
          TAG_NO_V="${TAG#v}"
          if [ "$TAG_NO_V" != "$PKG" ]; then
            echo "::error::Tag ($TAG) does not match package.json version ($PKG)"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pre-publish checks
        run: |
          bun run typecheck
          bun run lint
          bun run format:check
          bun test
        env:
          BUN_CHROME_PATH: /usr/bin/google-chrome

      - name: Build
        run: bun run build

      - name: Inspect pack contents
        run: bun pm pack --dry-run

      - name: Produce tarball (dry-run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: bun pm pack

      - name: Upload tarball artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bunwright-tarball
          path: "*.tgz"
          retention-days: 7

      - name: Publish to npm
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        run: npm publish --provenance
